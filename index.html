<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBLAR - Simulador Profissional</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0c1628">
    <style>
        :root { 
            --gold-mid: #BF953F; --gold-light: #FCF6BA;
            --bg-deep-blue: #0c1628; --screen-bg: rgba(245, 247, 250, 0.98);
            --card-bg: white; --text-main: #333; --text-label: #888;
            --input-bg: #fdfdfd; --input-border: #e1e4e8; --readonly-bg: #f1f3f5;
        }
        .dark-theme {
            --screen-bg: #0c1628; --card-bg: #16243d; --text-main: #f0f0f0;
            --text-label: #FCF6BA; --input-bg: #1f2d47; --input-border: #3a4b6b;
            --readonly-bg: #09101d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep-blue); height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; display: flex; justify-content: center; align-items: center; }
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background-image: url('https://raw.githubusercontent.com/kakashikempachi/Calculadora-JBLAR/refs/heads/main/file_000000002f64720e9e886d9bc8e6a94f.png'); background-size: cover; background-position: center top; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        #home-screen { justify-content: flex-end; background: linear-gradient(to bottom, transparent 30%, rgba(12, 22, 40, 0.9) 100%); padding-bottom: 60px; }
        .button-container { width: 100%; padding: 0 35px; display: flex; flex-direction: column; gap: 18px; }
        
        .btn-gold { width: 100%; padding: 18px; background: linear-gradient(135deg, #BF953F, #FCF6BA, #AA771C); border: 1px solid #7a5a12; border-radius: 14px; color: #0c1628; font-weight: 800; font-size: 14px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .btn-clear { background: #f1f3f5; border: 1px solid #ddd; color: #666; padding: 8px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; width: 100%; transition: 0.2s; }
        .btn-clear:active { background: #e2e4e7; }
        
        #calc-screen { background: var(--screen-bg); overflow-y: auto; }
        .header-nav { background: #0c1628; padding: 15px 20px; color: #FCF6BA; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #BF953F; }
        .content { padding: 15px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .tabs-header { display: flex; gap: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 14px 5px; border: none; border-radius: 8px; font-size: 13px; font-weight: 800; text-transform: uppercase; color: #888; background: transparent; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, #BF953F, #FCF6BA); color: #0c1628; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        label { display: block; font-size: 9px; font-weight: 800; color: var(--text-label); margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--input-border); border-radius: 10px; font-size: 14px; background: var(--input-bg); color: var(--text-main); }
        .input-row { display: flex; gap: 8px; }
        .input-row div { flex: 1; }
        .readonly { background: var(--readonly-bg); font-weight: 700; border-color: transparent; }
        .macro-preview { width: 100%; height: 130px; border: 1.5px dashed #BF953F; border-radius: 10px; padding: 10px; font-size: 10px; background: var(--input-bg); resize: none; margin-top: 10px; color: var(--text-main); line-height: 1.3; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="home-screen" class="screen active">
        <div class="button-container">
            <button class="btn-gold" onclick="nav('calc-screen')">Plano & Plano</button>
            <button class="btn-gold" style="opacity: 0.5; filter: grayscale(1); cursor: not-allowed;">Cyrela (Em breve)</button>
        </div>
    </div>

    <div id="calc-screen" class="screen">
        <div class="header-nav">
            <span onclick="nav('home-screen')" style="cursor:pointer;">❮ VOLTAR</span>
            <div onclick="toggleTheme()" style="cursor:pointer;">🌙</div>
        </div>
        
        <div class="content">
            <div class="card">
                <div class="tabs-header">
                    <button class="tab-btn active" id="btn-h" onclick="switchTab('tab-h')">Pré Habite-se</button>
                    <button class="tab-btn" id="btn-s" onclick="switchTab('tab-s')">Serasa</button>
                </div>

                <div id="tab-h" class="tab-content active">
                    <button class="btn-clear" onclick="clearTab('h')">🧹 Limpar Acordo</button>
                    <label>Saldo Devedor</label>
                    <input type="text" id="h-saldo" placeholder="R$ 0,00" oninput="mask(this, calcH)">
                    <div class="input-row">
                        <div><label>% Ato</label><input type="number" id="h-p" value="50" oninput="calcH()"></div>
                        <div><label>Vlr Ato</label><input type="text" id="h-vA" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>Pagamento</label><input type="date" id="h-d1" oninput="calcH()"></div>
                        <div><label>Habite-se</label><input type="date" id="h-d2" oninput="calcH()"></div>
                    </div>
                    <div class="input-row">
                        <div><label>Meses</label><input type="text" id="h-m" class="readonly" readonly></div>
                        <div><label>Parcelas</label><input type="number" id="h-q" value="3" oninput="calcH()"></div>
                    </div>
                    <label>Valor Parcela</label>
                    <input type="text" id="h-vP" class="readonly" readonly>
                    <textarea id="macro-h" class="macro-preview" readonly placeholder="Aguardando dados..."></textarea>
                    <button class="btn-gold" style="margin-top: 10px; width: 100%;" onclick="copy('macro-h')">COPIAR ACORDO</button>
                </div>

                <div id="tab-s" class="tab-content">
                    <button class="btn-clear" onclick="clearTab('s')">🧹 Limpar Acordo</button>
                    <div class="input-row">
                        <div><label>Aging (Dias)</label><input type="number" id="s-ag" placeholder="Ex: 74" oninput="calcS()"></div>
                        <div><label>Saldo Devedor</label><input type="text" id="s-s" placeholder="R$ 0,00" oninput="mask(this, calcS)"></div>
                    </div>
                    <label>FAIXA DE ATRASO</label>
                    <input type="text" id="s-c" class="readonly" readonly placeholder="Aguardando...">
                    <div class="input-row">
                        <div><label>Desc (%)</label><input type="text" id="s-dp" class="readonly" readonly></div>
                        <div><label>Máx Parc</label><input type="text" id="s-mp" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>Vlr Desconto</label><input type="text" id="s-vd" class="readonly" readonly></div>
                        <div><label>Vlr c/ Desconto</label><input type="text" id="s-vcd" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>% do Ato</label><input type="number" id="s-ap" value="1" oninput="calcS()"></div>
                        <div><label>Vlr do Ato</label><input type="text" id="s-va" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>Qtd Parc</label><input type="number" id="s-qp" value="1" oninput="calcS()"></div>
                        <div><label>Vlr Parc</label><input type="text" id="s-vp" class="readonly" readonly></div>
                    </div>
                    <textarea id="macro-s" class="macro-preview" readonly placeholder="Aguardando dados..."></textarea>
                    <button class="btn-gold" style="margin-top: 10px; width: 100%;" onclick="copy('macro-s')">COPIAR ACORDO</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const f = (n) => n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById(id === 'tab-h' ? 'btn-h' : 'btn-s').classList.add('active');
    }

    function clearTab(type) {
        const inputs = document.querySelectorAll(`#tab-${type} input`);
        inputs.forEach(input => {
            if(input.type === 'number') {
                if(input.id.includes('-p') || input.id.includes('-ap')) input.value = "50"; // Reset %
                else if(input.id.includes('-q') || input.id.includes('-qp')) input.value = "1"; // Reset Qtd
                else input.value = "";
            } else {
                input.value = "";
            }
        });
        document.getElementById(`macro-${type}`).value = "";
    }

    function mask(i, cb) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".", ",").replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,").replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v !== "0,00" ? "R$ " + v : "";
        cb();
    }

    function toggleTheme() { document.body.classList.toggle('dark-theme'); }

    function calcH() {
        const sRaw = document.getElementById('h-saldo').value;
        const s = parseFloat(sRaw.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        const macro = document.getElementById('macro-h');
        if (s <= 0) { macro.value = ""; return; }
        const p = parseFloat(document.getElementById('h-p').value) || 0;
        const q = parseInt(document.getElementById('h-q').value) || 1;
        const d1 = document.getElementById('h-d1').value, d2 = document.getElementById('h-d2').value;
        const vA = s * (p/100), vP = (s - vA)/q;
        let m = 0;
        if(d1 && d2) m = Math.max(0, (new Date(d2).getFullYear() - new Date(d1).getFullYear()) * 12 + (new Date(d2).getMonth() - new Date(d1).getMonth()));
        document.getElementById('h-vA').value = f(vA); document.getElementById('h-vP').value = f(vP); document.getElementById('h-m').value = m + " meses";
        macro.value = `🏢 *ACORDO JBLAR - HABITE-SE*\n\n💰 Saldo Devedor: ${f(s)}\n🤝 Valor do Ato: ${f(vA)}\n📅 Parcelamento: ${q}x de ${f(vP)}`;
    }

    function getFaixa(ag, s) {
        if (ag >= 31 && ag <= 60) return s <= 1500 ? "Aging 31 a 60 Faixa 2" : "Aging 31 a 60 Faixa 3";
        if (ag >= 61 && ag <= 90) return s <= 1500 ? "Aging 61 a 90 Faixa 2" : "Aging 61 a 90 Faixa 3";
        if (ag >= 91 && ag <= 180) return s <= 3000 ? "Aging 91 a 180 Faixa 3" : "Aging 91 a 180 Faixa 4";
        if (ag >= 181 && ag <= 364) return s <= 5000 ? "Aging 181 a 364 Faixa 4" : "Aging 181 a 364 Faixa 5";
        if (ag >= 365 && ag <= 730) return s <= 20000 ? "Aging 365 a 730 Faixa 6" : "Aging 365 a 730 Faixa 7";
        if (ag >= 731 && ag <= 1095) return s <= 5000 ? "Aging 731 a 1095 Faixa 4" : "Aging 731 a 1095 Faixa 5";
        if (ag > 1095) return "Aging Master Faixa 7";
        return "";
    }

    function calcS() {
        const ag = parseInt(document.getElementById('s-ag').value) || 0;
        const sRaw = document.getElementById('s-s').value;
        const s = parseFloat(sRaw.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        const macro = document.getElementById('macro-s');
        if (s <= 0 || !ag) { macro.value = ""; return; }
        const fx = getFaixa(ag, s);
        let d = 0;
        if(fx.includes("31 a 60")) d = 0.05; else if(fx.includes("61 a 90")) d = 0.10; else if(fx.includes("91 a 180")) d = 0.15; else if(fx.includes("181 a 364")) d = 0.25; else if(fx.includes("365 a 730")) d = 0.30; else if(fx.includes("731 a 1095")) d = 0.50; else d = 0.70;
        const vD = s * d, vCD = s - vD, ap = parseFloat(document.getElementById('s-ap').value) || 0;
        const vA = vCD * (ap/100), qp = parseInt(document.getElementById('s-qp').value) || 1, vP = (vCD - vA)/qp;
        document.getElementById('s-c').value = fx; document.getElementById('s-dp').value = (d*100) + "%"; document.getElementById('s-vd').value = f(vD); document.getElementById('s-vcd').value = f(vCD); document.getElementById('s-va').value = f(vA); document.getElementById('s-vp').value = f(vP);
        macro.value = `🤝 *CAMPANHA SERASA - JBLAR*\n\n💰 Saldo Total: ${f(s)}\n📉 Desconto (${(d*100)}%): ${f(vD)}\n✅ Saldo com Desconto: ${f(vCD)}\n\n💵 Pagamento de ATO: ${f(vA)}\n📅 Parcelado em: ${qp}x de ${f(vP)}\n\n⚠️ O não pagamento do boleto do ATO até a data combinada acarretará na perda da oferta com desconto.`;
    }

    function copy(id) { 
        const t = document.getElementById(id); 
        if(t.value) { navigator.clipboard.writeText(t.value).then(() => alert("Acordo copiado!")); }
        else { alert("Preencha os dados primeiro."); }
    }
</script>
</body>
</html>
