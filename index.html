<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBLAR - Simulador de Acordos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0c1628">

    <style>
        :root { 
            --gold-dark: #AA771C;
            --gold-mid: #BF953F;
            --gold-light: #FCF6BA;
            --bg-deep-blue: #0c1628;
            --screen-bg: rgba(245, 247, 250, 0.98);
            --card-bg: white;
            --text-main: #333;
            --text-label: #888;
            --input-bg: #fdfdfd;
            --input-border: #e1e4e8;
            --readonly-bg: #f1f3f5;
        }

        .dark-theme {
            --screen-bg: #0c1628;
            --card-bg: #16243d;
            --text-main: #f0f0f0;
            --text-label: #FCF6BA;
            --input-bg: #1f2d47;
            --input-border: #3a4b6b;
            --readonly-bg: #09101d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-deep-blue); 
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        #app-container { 
            width: 100%; max-width: 480px; height: 100%;
            position: relative;
            background-image: url('https://raw.githubusercontent.com/kakashikempachi/Calculadora-JBLAR/refs/heads/main/file_000000002f64720e9e886d9bc8e6a94f.png');
            background-size: cover; background-position: center top;
            background-color: var(--bg-deep-blue);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .screen { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; z-index: 10; }
        .screen.active { display: flex; }

        #home-screen {
            justify-content: flex-end; 
            background: linear-gradient(to bottom, transparent 30%, rgba(12, 22, 40, 0.8) 100%);
            padding-bottom: 60px;
        }

        .button-container { width: 100%; padding: 0 35px; display: flex; flex-direction: column; gap: 18px; }

        .btn-gold {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 30%, #B38728 50%, #FBF5B7 70%, #AA771C 100%);
            background-size: 200% auto;
            border: 1px solid #7a5a12; border-radius: 14px;
            color: #0c1628; font-weight: 800; font-size: 15px;
            text-transform: uppercase; letter-spacing: 1.2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 0 12px rgba(255, 255, 255, 0.5);
            cursor: pointer; transition: 0.3s;
        }
        .btn-gold:active { transform: scale(0.95); background-position: right center; }

        /* ABAS */
        .tabs-header { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; color: #888; background: transparent; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #BF953F, #FCF6BA); color: #0c1628; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* CONTEÚDO */
        #calc-screen { background: var(--screen-bg); overflow-y: auto; }
        .header-nav { background-color: #0c1628; padding: 20px; color: #FCF6BA; font-weight: bold; display: flex; align-items: center; border-bottom: 3px solid #BF953F; justify-content: space-between; }
        .content { padding: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        label { display: block; font-size: 10px; font-weight: 800; color: var(--text-label); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--input-border); border-radius: 12px; font-size: 15px; background: var(--input-bg); color: var(--text-main); }
        
        .input-row { display: flex; gap: 10px; }
        .input-row div { flex: 1; }
        .readonly { background: var(--readonly-bg); font-weight: 700; border-color: transparent; }
        
        #macro-preview { 
            width: 100%; height: 120px; border: 2px dashed #BF953F; border-radius: 12px; 
            padding: 12px; font-size: 11px; background: var(--input-bg); resize: none; 
            margin-top: 15px; color: var(--text-main); line-height: 1.4;
        }
