<div id="tab-serasa" class="tab-content">
                    <div class="input-row">
                        <div><label>Aging (Dias)</label><input type="number" id="s-aging" placeholder="Ex: 74" oninput="calcSerasa()"></div>
                        <div><label>Saldo Devedor (R$)</label><input type="text" id="s-saldo" placeholder="R$ 0,00" oninput="maskSerasa(this)"></div>
                    </div>
                    
                    <label>Carteira Identificada</label>
                    <input type="text" id="s-carteira" class="readonly" readonly placeholder="Aguardando dados...">

                    <div class="input-row">
                        <div><label>Desconto (%)</label><input type="text" id="s-desc-perc" class="readonly" readonly></div>
                        <div><label>Máx. Parcelas</label><input type="text" id="s-max-p" class="readonly" readonly></div>
                    </div>

                    <div class="input-row">
                        <div><label>Valor Desconto</label><input type="text" id="s-v-desc" class="readonly" readonly></div>
                        <div><label>Saldo c/ Desconto</label><input type="text" id="s-v-com-desc" class="readonly" readonly></div>
                    </div>

                    <div class="input-row">
                        <div><label>% do Ato</label><input type="number" id="s-ato-perc" value="1" oninput="calcSerasa()"></div>
                        <div><label>Valor do Ato</label><input type="text" id="s-v-ato" class="readonly" readonly></div>
                    </div>

                    <div class="input-row">
                        <div><label>Qtd. Parcelas</label><input type="number" id="s-q-p" value="1" oninput="calcSerasa()"></div>
                        <div><label>Valor Parcela</label><input type="text" id="s-v-p" class="readonly" readonly></div>
                    </div>
                </div>
<script>
    // --- LÓGICA SERASA ---
    function maskSerasa(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".", ",").replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,").replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v !== "0,00" ? "R$ " + v : "";
        calcSerasa();
    }

    function getCarteira(aging, saldo) {
        if (aging >= 31 && aging <= 60) {
            if (saldo <= 700) return "Aging 31 a 60 Faixa 1";
            if (saldo <= 1500) return "Aging 31 a 60 Faixa 2";
            return "Aging 31 a 60 Faixa 3";
        }
        if (aging >= 61 && aging <= 90) {
            if (saldo <= 700) return "Aging 61 a 90 Faixa 1";
            if (saldo <= 1500) return "Aging 61 a 90 Faixa 2";
            return "Aging 61 a 90 Faixa 3";
        }
        if (aging >= 91 && aging <= 180) {
            if (saldo <= 700) return "Aging 91 a 180 Faixa 1";
            if (saldo <= 1500) return "Aging 91 a 180 Faixa 2";
            if (saldo <= 3000) return "Aging 91 a 180 Faixa 3";
            return "Aging 91 a 180 Faixa 4";
        }
        if (aging >= 181 && aging <= 364) {
            if (saldo <= 700) return "Aging 181 a 364 Faixa 1";
            if (saldo <= 1500) return "Aging 181 a 364 Faixa 2";
            if (saldo <= 3000) return "Aging 181 a 364 Faixa 3";
            if (saldo <= 5000) return "Aging 181 a 364 Faixa 4";
            return "Aging 181 a 364 Faixa 5";
        }
        if (aging >= 365 && aging <= 730) {
            if (saldo <= 700) return "Aging 365 a 730 Faixa 1";
            if (saldo <= 1500) return "Aging 365 a 730 Faixa 2";
            if (saldo <= 3000) return "Aging 365 a 730 Faixa 3";
            if (saldo <= 5000) return "Aging 365 a 730 Faixa 4";
            if (saldo <= 10000) return "Aging 365 a 730 Faixa 5";
            if (saldo <= 20000) return "Aging 365 a 730 Faixa 6";
            return "Aging 365 a 730 Faixa 7";
        }
        if (aging >= 731 && aging <= 1095) {
            if (saldo <= 700) return "Aging 731 a 1095 Faixa 1";
            if (saldo <= 1500) return "Aging 731 a 1095 Faixa 2";
            if (saldo <= 3000) return "Aging 731 a 1095 Faixa 3";
            if (saldo <= 5000) return "Aging 731 a 1095 Faixa 4";
            return "Aging 731 a 1095 Faixa 5";
        }
        if (aging >= 1096 && aging <= 1460) {
            if (saldo <= 700) return "Aging 1096 a 1460 Faixa 1";
            if (saldo <= 1500) return "Aging 1096 a 1460 Faixa 2";
            if (saldo <= 3000) return "Aging 1096 a 1460 Faixa 3";
            if (saldo <= 5000) return "Aging 1096 a 1460 Faixa 4";
            return "Aging 1096 a 1460 Faixa 5";
        }
        if (aging > 1460) {
            if (saldo <= 700) return "Aging Maior 1460 Faixa 1";
            if (saldo <= 1500) return "Aging Maior 1460 Faixa 2";
            if (saldo <= 3000) return "Aging Maior 1460 Faixa 3";
            if (saldo <= 5000) return "Aging Maior 1460 Faixa 4";
            if (saldo <= 10000) return "Aging Maior 1460 Faixa 5";
            if (saldo <= 20000) return "Aging Maior 1460 Faixa 6";
            return "Aging Maior 1460 Faixa 7";
        }
        return "";
    }

    function calcSerasa() {
        const aging = parseInt(document.getElementById('s-aging').value) || 0;
        const saldoTotal = parseFloat(document.getElementById('s-saldo').value.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        const atoPerc = parseFloat(document.getElementById('s-ato-perc').value) || 0;
        const qtdP = parseInt(document.getElementById('s-q-p').value) || 1;

        const carteira = getCarteira(aging, saldoTotal);
        document.getElementById('s-carteira').value = carteira;

        let desc = 0;
        let maxP = 0;

        // Lógica de Desconto (B7)
        if (carteira.includes("31 a 60")) desc = 0.05;
        else if (carteira.includes("61 a 90")) desc = 0.10;
        else if (carteira.includes("91 a 180")) desc = 0.15;
        else if (carteira.includes("181 a 364")) desc = 0.25;
        else if (carteira.includes("365 a 730")) desc = 0.30;
        else if (carteira.includes("731 a 1095")) desc = 0.50;
        else if (carteira.includes("1096 a 1460")) desc = 0.60;
        else if (carteira.includes("Maior 1460")) desc = 0.70;

        // Lógica de Parcelas (B8) - Mapeamento exato da sua planilha
        const parcelasMap = {
            "Aging 31 a 60 Faixa 3": 8, "Aging 61 a 90 Faixa 3": 6, "Aging 91 a 180 Faixa 3": 6, "Aging 91 a 180 Faixa 4": 12,
            "Aging 181 a 364 Faixa 3": 6, "Aging 181 a 364 Faixa 4": 12, "Aging 181 a 364 Faixa 5": 20,
            "Aging 365 a 730 Faixa 3": 7, "Aging 365 a 730 Faixa 4": 12, "Aging 365 a 730 Faixa 5": 20, "Aging 365 a 730 Faixa 6": 36, "Aging 365 a 730 Faixa 7": 60,
            "Aging 731 a 1095 Faixa 3": 7, "Aging 731 a 1095 Faixa 4": 12, "Aging 731 a 1095 Faixa 5": 36,
            "Aging 1096 a 1460 Faixa 3": 6, "Aging 1096 a 1460 Faixa 4": 12, "Aging 1096 a 1460 Faixa 5": 54,
            "Aging Maior 1460 Faixa 2": 4, "Aging Maior 1460 Faixa 3": 6, "Aging Maior 1460 Faixa 4": 12, "Aging Maior 1460 Faixa 5": 24, "Aging Maior 1460 Faixa 6": 36, "Aging Maior 1460 Faixa 7": 60
        };
        maxP = parcelasMap[carteira] || 3;

        const vDesc = saldoTotal * desc;
        const vComDesc = saldoTotal - vDesc;
        const vAto = vComDesc * (atoPerc / 100);
        const vReman = vComDesc - vAto;
        const vParcela = vReman / qtdP;

        const f = (n) => n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        
        document.getElementById('s-desc-perc').value = (desc * 100).toFixed(0) + "%";
        document.getElementById('s-max-p').value = maxP;
        document.getElementById('s-v-desc').value = f(vDesc);
        document.getElementById('s-v-com-desc').value = f(vComDesc);
        document.getElementById('s-v-ato').value = f(vAto);
        document.getElementById('s-v-p').value = f(vParcela);

        if(saldoTotal > 0) {
            document.getElementById('macro-preview').value = 
                `🤝 *OFERTA CAMPANHA SERASA - JBLAR*\n\n` +
                `💰 *Saldo Devedor Total:* ${f(saldoTotal)}\n` +
                `📉 *Desconto aplicado:* ${(desc*100)}% (${f(vDesc)})\n` +
                `✅ *Saldo com desconto:* ${f(vComDesc)}\n\n` +
                `💵 *Pagamento de ATO:* ${f(vAto)}\n` +
                `📅 *Parcelamento:* ${qtdP}x de ${f(vParcela)}\n\n` +
                `⚠️ *Atenção:* O não pagamento do ATO acarreta na perda desta oferta e possíveis medidas judiciais.`;
        }
    }
</script>
