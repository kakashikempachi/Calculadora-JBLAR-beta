<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBLAR - Simulador Oficial</title>
    <style>
        :root { 
            --gold-dark: #AA771C;
            --gold-mid: #BF953F;
            --gold-light: #FCF6BA;
            --bg-deep-blue: #0c1628;
            --screen-bg: rgba(245, 247, 250, 0.98);
            --card-bg: white;
            --text-main: #333;
            --text-label: #888;
            --input-bg: #fdfdfd;
            --input-border: #e1e4e8;
            --readonly-bg: #f1f3f5;
        }

        .dark-theme {
            --screen-bg: #0c1628;
            --card-bg: #16243d;
            --text-main: #f0f0f0;
            --text-label: #FCF6BA;
            --input-bg: #1f2d47;
            --input-border: #3a4b6b;
            --readonly-bg: #09101d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-deep-blue); 
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        #app-container { 
            width: 100%; max-width: 480px; height: 100%;
            position: relative;
            background-image: url('https://raw.githubusercontent.com/kakashikempachi/Calculadora-JBLAR/refs/heads/main/file_000000002f64720e9e886d9bc8e6a94f.png');
            background-size: cover; background-position: center top;
            background-color: var(--bg-deep-blue);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .screen { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; }
        .screen.active { display: flex; }

        #home-screen {
            justify-content: flex-end; 
            background: linear-gradient(to bottom, transparent 30%, rgba(12, 22, 40, 0.8) 100%);
            padding-bottom: 60px;
        }

        .button-container { width: 100%; padding: 0 35px; display: flex; flex-direction: column; gap: 18px; }

        .btn-gold {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 30%, #B38728 50%, #FBF5B7 70%, #AA771C 100%);
            background-size: 200% auto;
            border: 1px solid #7a5a12; border-radius: 14px;
            color: #0c1628; font-weight: 800; font-size: 15px;
            text-transform: uppercase; letter-spacing: 1.2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 0 12px rgba(255, 255, 255, 0.5);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-gold:active { transform: scale(0.95); background-position: right center; }

        /* NAVEGAÇÃO DE ABAS */
        .tabs-header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.05);
            padding: 5px;
            border-radius: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            color: #888;
            background: transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #BF953F, #FCF6BA);
            color: #0c1628;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* SIMULADOR */
        #calc-screen { background: var(--screen-bg); overflow-y: auto; transition: background 0.3s; }
        .header-nav { background-color: #0c1628; padding: 20px; color: #FCF6BA; font-weight: bold; display: flex; align-items: center; border-bottom: 3px solid #BF953F; justify-content: space-between; }
        .content { padding: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        label { display: block; font-size: 10px; font-weight: 800; color: var(--text-label); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid var(--input-border); border-radius: 12px; font-size: 16px; background: var(--input-bg); color: var(--text-main); }
        
        .input-row { display: flex; gap: 12px; }
        .input-row div { flex: 1; }
        .readonly { background: var(--readonly-bg); font-weight: 700; border-color: transparent; }
        #macro-preview { width: 100%; height: 130px; border: 2px dashed #BF953F; border-radius: 12px; padding: 12px; font-size: 13px; background: var(--input-bg); resize: none; margin-top: 10px; color: var(--text-main); }
        .btn-copy { margin-top: 20px; }
        .theme-toggle { cursor: pointer; font-size: 20px; padding: 5px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="home-screen" class="screen active">
        <div class="button-container">
            <button class="btn-gold" onclick="nav('calc-screen')">Plano & Plano</button>
            <button class="btn-gold" style="opacity: 0.5; filter: grayscale(1);">Cyrela (Em breve)</button>
        </div>
    </div>

    <div id="calc-screen" class="screen">
        <div class="header-nav">
            <div>
                <span onclick="nav('home-screen')" style="cursor:pointer; padding-right: 15px;">❮ VOLTAR</span>
                <span>SIMULADOR JBLAR</span>
            </div>
            <div class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</div>
        </div>
        
        <div class="content">
            <div class="card">
                <div class="tabs-header">
                    <button class="tab-btn active" onclick="switchTab('tab-habite')">Pré Habite-se</button>
                    <button class="tab-btn" onclick="switchTab('tab-serasa')">Campanha Serasa</button>
                </div>

                <div id="tab-habite" class="tab-content active">
                    <label>Saldo Devedor (R$)</label>
                    <input type="text" id="saldo" inputmode="numeric" placeholder="R$ 0,00" oninput="mask(this)">
                    
                    <div class="input-row">
                        <div><label>% do Ato</label><input type="number" id="perc" value="50" oninput="calc()"></div>
                        <div><label>Valor do Ato</label><input type="text" id="vAto" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>Pagamento</label><input type="date" id="d1" oninput="calc()"></div>
                        <div><label>Habite-se</label><input type="date" id="d2" oninput="calc()"></div>
                    </div>
                    <div class="input-row">
                        <div><label>Meses</label><input type="text" id="mesM" class="readonly" readonly></div>
                        <div><label>Parcelas</label><input type="number" id="qP" value="3" oninput="calc()"></div>
                    </div>
                    <label>Valor da Parcela</label>
                    <input type="text" id="vP" class="readonly" readonly>
                </div>

                <div id="tab-serasa" class="tab-content">
                    <div style="text-align: center; padding: 40px 0; color: var(--text-label);">
                        <p style="font-weight: 800;">🚀 CAMPANHA SERASA</p>
                        <p style="font-size: 12px; margin-top: 10px;">Aguardando definições de cálculo...</p>
                    </div>
                </div>

                <textarea id="macro-preview" readonly></textarea>
                <button class="btn-gold btn-copy" onclick="copy()">COPIAR ACORDO</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Função para alternar entre as abas do simulador
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        // Limpa o preview ao trocar de aba para evitar confusão
        document.getElementById('macro-preview').value = "";
    }

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        body.classList.toggle('dark-theme');
        icon.innerText = body.classList.contains('dark-theme') ? "☀️" : "🌙";
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function mask(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".", ",").replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,").replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v !== "0,00" ? "R$ " + v : "";
        calc();
    }

    function calc() {
        // Lógica da Aba Pré Habite-se (Existente)
        const s = parseFloat(document.getElementById('saldo').value.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        const p = parseFloat(document.getElementById('perc').value) || 0;
        const q = parseInt(document.getElementById('qP').value) || 1;
        
        const vA = s * (p / 100);
        const vPa = (s - vA) / q;

        const d1Input = document.getElementById('d1').value;
        const d2Input = document.getElementById('d2').value;
        
        let m = 0;
        let dataAtoFormatada = "";
        document.getElementById('mesM').value = "";

        if (d1Input) {
            const d1Date = new Date(d1Input + 'T00:00:00');
            dataAtoFormatada = d1Date.toLocaleDateString('pt-BR');
        }

        if (d1Input && d2Input) {
            const date1 = new Date(d1Input + 'T00:00:00');
            const date2 = new Date(d2Input + 'T00:00:00');
            if (date2 > date1) {
                m = (date2.getFullYear() - date1.getFullYear()) * 12 + (date2.getMonth() - date1.getMonth());
                if (date2.getDate() < date1.getDate()) m--;
            }
        }

        const f = (n) => n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        document.getElementById('vAto').value = f(vA);
        document.getElementById('vP').value = f(vPa);
        document.getElementById('mesM').value = m > 0 ? m + " meses" : "0 meses";

        if(s > 0) {
            document.getElementById('macro-preview').value = 
                `🏢 *ACORDO JBLAR*\n\n` +
                `💰 *Saldo Devedor:* ${f(s)}\n` +
                `🤝 *Ato/Entrada:* ${f(vA)} com pagamento no dia ${dataAtoFormatada}\n` +
                `📅 *Parcelamento:* ${q}x de ${f(vPa)} após confirmação do pagamento do ato`;
        }
    }

    function copy() {
        const t = document.getElementById('macro-preview');
        if(!t.value) return alert("Simule um valor primeiro.");
        navigator.clipboard.writeText(t.value).then(() => alert("Copiado com sucesso!"));
    }
</script>
</body>
</html>
