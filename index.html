<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBLAR - Simulador Oficial</title>
    <style>
        :root { 
            --gold-dark: #AA771C;
            --gold-mid: #BF953F;
            --gold-light: #FCF6BA;
            --bg-deep-blue: #0c1628; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-deep-blue); 
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        #app-container { 
            width: 100%; 
            max-width: 480px;
            height: 100%;
            position: relative;
            background-image: url('https://raw.githubusercontent.com/kakashikempachi/Calculadora-JBLAR/refs/heads/main/file_000000002f64720e9e886d9bc8e6a94f.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-color: var(--bg-deep-blue);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .screen { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; }
        .screen.active { display: flex; }

        #home-screen {
            justify-content: flex-end; 
            background: linear-gradient(to bottom, transparent 30%, rgba(12, 22, 40, 0.8) 100%);
            padding-bottom: 60px;
        }

        .button-container {
            width: 100%;
            padding: 0 35px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn-gold {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 30%, #B38728 50%, #FBF5B7 70%, #AA771C 100%);
            background-size: 200% auto;
            border: 1px solid #7a5a12;
            border-radius: 14px;
            color: #0c1628; 
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 0 12px rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-gold:active { transform: scale(0.95); background-position: right center; }

        .btn-disabled {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
        }

        #calc-screen { background: rgba(245, 247, 250, 0.98); overflow-y: auto; }

        .header-nav {
            background-color: #0c1628;
            padding: 20px;
            color: #FCF6BA;
            font-weight: bold;
            display: flex;
            align-items: center;
            border-bottom: 3px solid #BF953F;
        }

        .content { padding: 20px; }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        h2 { color: #AA771C; font-size: 18px; margin-bottom: 20px; text-align: center; font-weight: 700; }

        label { display: block; font-size: 10px; font-weight: 800; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; margin-bottom: 15px; 
            border: 1px solid #e1e4e8; border-radius: 12px; 
            font-size: 16px; background: #fdfdfd; color: #333;
        }

        .input-row { display: flex; gap: 12px; }
        .input-row div { flex: 1; }
        .readonly { background: #f1f3f5; color: #000; font-weight: 700; border-color: #eee; }

        #macro-preview { 
            width: 100%; height: 130px; border: 2px dashed #BF953F; 
            border-radius: 12px; padding: 12px; font-size: 13px; 
            background: #fffdf9; resize: none; margin-top: 10px; line-height: 1.5; color: #444;
        }

        .btn-copy { margin-top: 20px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="home-screen" class="screen active">
        <div class="button-container">
            <button class="btn-gold" onclick="nav('calc-screen')">Plano & Plano</button>
            <button class="btn-gold btn-disabled">Cyrela (Em breve)</button>
        </div>
    </div>

    <div id="calc-screen" class="screen">
        <div class="header-nav">
            <span onclick="nav('home-screen')" style="cursor:pointer; padding-right: 20px;">❮ VOLTAR</span>
            <span>SIMULADOR JBLAR</span>
        </div>
        <div class="content">
            <div class="card">
                <h2>Simulador Pré Habite-se</h2>
                
                <label>Saldo Devedor (R$)</label>
                <input type="text" id="saldo" inputmode="numeric" placeholder="R$ 0,00" oninput="mask(this)">
                
                <div class="input-row">
                    <div>
                        <label>% do Ato</label>
                        <input type="number" id="perc" value="50" oninput="calc()">
                    </div>
                    <div>
                        <label>Valor do Ato</label>
                        <input type="text" id="vAto" class="readonly" readonly>
                    </div>
                </div>

                <div class="input-row">
                    <div><label>Data do pagamento</label><input type="date" id="d1" oninput="calc()"></div>
                    <div><label>Habite-se</label><input type="date" id="d2" oninput="calc()"></div>
                </div>

                <div class="input-row">
                    <div><label>Meses</label><input type="text" id="mesM" class="readonly" readonly></div>
                    <div><label>Parcelas</label><input type="number" id="qP" value="3" oninput="calc()"></div>
                </div>

                <label>Valor da Parcela</label>
                <input type="text" id="vP" class="readonly" readonly>

                <textarea id="macro-preview" readonly></textarea>
                <button class="btn-gold btn-copy" onclick="copy()">COPIAR ACORDO</button>
            </div>
        </div>
    </div>
</div>

<script>
    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function mask(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".", ",").replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,").replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v !== "0,00" ? "R$ " + v : "";
        calc();
    }

    function calc() {
        const s = parseFloat(document.getElementById('saldo').value.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        const p = parseFloat(document.getElementById('perc').value) || 0;
        const q = parseInt(document.getElementById('qP').value) || 1;
        
        const vA = s * (p / 100);
        const vPa = (s - vA) / q;

        const d1Input = document.getElementById('d1').value;
        const d2Input = document.getElementById('d2').value;
        
        let m = 0;
        let dataAtoFormatada = "";

        // Reinicia o campo de meses antes do novo cálculo
        document.getElementById('mesM').value = "";

        if (d1Input) {
            const d1Date = new Date(d1Input + 'T00:00:00');
            dataAtoFormatada = d1Date.toLocaleDateString('pt-BR');
        }

        if (d1Input && d2Input) {
            const date1 = new Date(d1Input + 'T00:00:00');
            const date2 = new Date(d2Input + 'T00:00:00');
            
            // Lógica ajustada para não acumular
            if (date2 > date1) {
                m = (date2.getFullYear() - date1.getFullYear()) * 12 + (date2.getMonth() - date1.getMonth());
                // Se o dia do Habite-se for menor que o dia do pagamento, subtrai um mês para ser preciso
                if (date2.getDate() < date1.getDate()) {
                    m--;
                }
            } else {
                m = 0;
            }
        }

        const f = (n) => n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        document.getElementById('vAto').value = f(vA);
        document.getElementById('vP').value = f(vPa);
        document.getElementById('mesM').value = m > 0 ? m + " meses" : "0 meses";

        if(s > 0) {
            document.getElementById('macro-preview').value = 
                `🏢 *ACORDO JBLAR*\n\n` +
                `💰 *Saldo Devedor:* ${f(s)}\n` +
                `🤝 *Ato/Entrada:* ${f(vA)} com pagamento no dia ${dataAtoFormatada}\n` +
                `📅 *Parcelamento:* ${q}x de ${f(vPa)} após confirmação do pagamento do ato`;
        }
    }

    function copy() {
        const t = document.getElementById('macro-preview');
        if(!t.value) return alert("Simule um valor primeiro.");
        navigator.clipboard.writeText(t.value).then(() => alert("Copiado com sucesso!"));
    }
</script>
</body>
</html>
