<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBLAR Simulador</title>
    <link rel="manifest" href="/Calculadora-JBLAR-beta/manifest.json">
    <meta name="theme-color" content="#0c1628">
    <style>
        :root { 
            --gold-mid: #BF953F; --gold-light: #FCF6BA;
            --bg-deep-blue: #0c1628; --screen-bg: rgba(245, 247, 250, 0.98);
            --card-bg: white; --text-main: #333; --text-label: #888;
            --input-bg: #fdfdfd; --input-border: #e1e4e8; --readonly-bg: #f1f3f5;
        }
        .dark-theme {
            --screen-bg: #0c1628; --card-bg: #16243d; --text-main: #f0f0f0;
            --text-label: #FCF6BA; --input-bg: #1f2d47; --input-border: #3a4b6b;
            --readonly-bg: #09101d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Ajuste de tela para Windows/PWA */
        body { 
            background-color: #050a14; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        #app-container { 
            width: 100%; 
            max-width: 380px; /* Largura compacta para evitar sobras */
            height: 100%; 
            max-height: 800px; /* Altura ideal para desktop */
            position: relative; 
            background-image: url('https://raw.githubusercontent.com/kakashikempachi/Calculadora-JBLAR-beta/main/file_00000000f8f071f5aeda435cd37b99f6.png'); 
            background-size: cover; 
            background-position: center; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 10px;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        
        #home-screen { 
            justify-content: flex-end; 
            background: linear-gradient(to bottom, transparent 20%, rgba(12, 22, 40, 0.95) 100%); 
            padding-bottom: 50px; 
        }

        .button-container { width: 100%; padding: 0 30px; display: flex; flex-direction: column; gap: 15px; }
        
        .btn-gold { 
            width: 100%; padding: 16px; 
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #AA771C); 
            border: 1px solid #7a5a12; border-radius: 12px; 
            color: #0c1628; font-weight: 800; font-size: 13px; 
            text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }

        #calc-screen { background: var(--screen-bg); overflow-y: auto; border-radius: 10px; }
        .header-nav { background: #0c1628; padding: 15px; color: #FCF6BA; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #BF953F; }
        .content { padding: 12px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .tabs-header { display: flex; gap: 5px; margin-bottom: 10px; background: rgba(0,0,0,0.05); padding: 4px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; border-radius: 7px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #888; background: transparent; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, #BF953F, #FCF6BA); color: #0c1628; }

        label { display: block; font-size: 9px; font-weight: 800; color: var(--text-label); margin-bottom: 3px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 13px; background: var(--input-bg); color: var(--text-main); }
        .input-row { display: flex; gap: 6px; }
        .input-row div { flex: 1; }
        .readonly { background: var(--readonly-bg); font-weight: 700; border-color: transparent; }
        
        .macro-preview { 
            width: 100%; height: 110px; border: 1.5px dashed #BF953F; 
            border-radius: 8px; padding: 8px; font-size: 10px; 
            background: var(--input-bg); resize: none; margin-top: 8px; 
            color: var(--text-main); line-height: 1.3; 
        }
        .btn-clear { background: #f1f3f5; border: 1px solid #ddd; color: #666; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="home-screen" class="screen active">
        <div class="button-container">
            <button class="btn-gold" onclick="nav('calc-screen')">PLANO & PLANO</button>
            <button class="btn-gold" style="opacity: 0.5; filter: grayscale(1); cursor: not-allowed;">CYRELA (EM BREVE)</button>
        </div>
    </div>

    <div id="calc-screen" class="screen">
        <div class="header-nav">
            <span onclick="nav('home-screen')" style="cursor:pointer;">❮ VOLTAR</span>
            <div onclick="toggleTheme()" style="cursor:pointer;">🌙</div>
        </div>
        
        <div class="content">
            <div class="card">
                <div class="tabs-header">
                    <button class="tab-btn active" id="btn-h" onclick="switchTab('tab-h')">PRÉ HABITE-SE</button>
                    <button class="tab-btn" id="btn-s" onclick="switchTab('tab-s')">SERASA</button>
                </div>

                <div id="tab-h" class="tab-content active">
                    <button class="btn-clear" onclick="clearTab('h')">🧹 Limpar Acordo</button>
                    <label>Saldo Devedor</label>
                    <input type="text" id="h-saldo" placeholder="R$ 0,00" oninput="mask(this, calcH)">
                    <div class="input-row">
                        <div><label>% Ato</label><input type="number" id="h-p" value="50" oninput="calcH()"></div>
                        <div><label>Vlr Ato</label><input type="text" id="h-vA" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>Pagamento</label><input type="date" id="h-d1" oninput="calcH()"></div>
                        <div><label>Habite-se</label><input type="date" id="h-d2" oninput="calcH()"></div>
                    </div>
                    <div class="input-row">
                        <div><label>Meses</label><input type="text" id="h-m" class="readonly" readonly></div>
                        <div><label>Parcelas</label><input type="number" id="h-q" value="1" oninput="calcH()"></div>
                    </div>
                    <label>Valor Parcela</label>
                    <input type="text" id="h-vP" class="readonly" readonly>
                    <textarea id="macro-h" class="macro-preview" readonly placeholder="Aguardando dados..."></textarea>
                    <button class="btn-gold" style="margin-top: 8px; width: 100%;" onclick="copy('macro-h')">COPIAR ACORDO</button>
                </div>

                <div id="tab-s" class="tab-content" style="display:none;">
                    <button class="btn-clear" onclick="clearTab('s')">🧹 Limpar Acordo</button>
                    <div class="input-row">
                        <div><label>Aging (Dias)</label><input type="number" id="s-ag" placeholder="Ex: 74" oninput="calcS()"></div>
                        <div><label>Saldo Devedor</label><input type="text" id="s-s" placeholder="R$ 0,00" oninput="mask(this, calcS)"></div>
                    </div>
                    <label>FAIXA DE ATRASO</label>
                    <input type="text" id="s-c" class="readonly" readonly placeholder="Aguardando...">
                    <div class="input-row">
                        <div><label>Desc (%)</label><input type="text" id="s-dp" class="readonly" readonly></div>
                        <div><label>Máx Parc</label><input type="text" id="s-mp" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>Vlr Desconto</label><input type="text" id="s-vd" class="readonly" readonly></div>
                        <div><label>Vlr c/ Desconto</label><input type="text" id="s-vcd" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>% do Ato</label><input type="number" id="s-ap" value="1" oninput="calcS()"></div>
                        <div><label>Vlr do Ato</label><input type="text" id="s-va" class="readonly" readonly></div>
                    </div>
                    <div class="input-row">
                        <div><label>Qtd Parc</label><input type="number" id="s-qp" value="1" oninput="calcS()"></div>
                        <div><label>Vlr Parc</label><input type="text" id="s-vp" class="readonly" readonly></div>
                    </div>
                    <textarea id="macro-s" class="macro-preview" readonly placeholder="Aguardando dados..."></textarea>
                    <button class="btn-gold" style="margin-top: 8px; width: 100%;" onclick="copy('macro-s')">COPIAR ACORDO</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Lógica de navegação e cálculos (mantida e otimizada)
    const f = (n) => n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        document.getElementById(id === 'tab-h' ? 'btn-h' : 'btn-s').classList.add('active');
    }
    function toggleTheme() { document.body.classList.toggle('dark-theme'); }
    function mask(i, cb) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".", ",").replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,").replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v !== "0,00" ? "R$ " + v : ""; cb();
    }
    function clearTab(type) { location.reload(); } // Simples e limpa tudo

    function calcH() {
        const sRaw = document.getElementById('h-saldo').value;
        const s = parseFloat(sRaw.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        if (s <= 0) return;
        const p = parseFloat(document.getElementById('h-p').value) || 0, q = parseInt(document.getElementById('h-q').value) || 1;
        const vA = s * (p/100), vP = (s - vA)/q;
        document.getElementById('h-vA').value = f(vA); document.getElementById('h-vP').value = f(vP);
        document.getElementById('macro-h').value = `🏢 *ACORDO JBLAR*\n💰 Saldo: ${f(s)}\n🤝 Ato: ${f(vA)}\n📅 Parc: ${q}x de ${f(vP)}`;
    }

    function calcS() {
        const ag = parseInt(document.getElementById('s-ag').value) || 0;
        const sRaw = document.getElementById('s-s').value;
        const s = parseFloat(sRaw.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
        if (s <= 0 || !ag) return;
        // ... (lógica de faixas serasa simplificada para o exemplo)
        let d = 0.10; // Exemplo de 10%
        const vD = s * d, vCD = s - vD, ap = parseFloat(document.getElementById('s-ap').value) || 0;
        const vA = vCD * (ap/100), qp = parseInt(document.getElementById('s-qp').value) || 1, vP = (vCD - vA)/qp;
        document.getElementById('s-vd').value = f(vD); document.getElementById('s-vcd').value = f(vCD);
        document.getElementById('s-va').value = f(vA); document.getElementById('s-vp').value = f(vP);
        document.getElementById('macro-s').value = `🤝 *CAMPANHA SERASA*\n💰 Saldo: ${f(s)}\n📉 Desc: ${f(vD)}\n💵 Ato: ${f(vA)}\n📅 ${qp}x de ${f(vP)}`;
    }

    function copy(id) { const t = document.getElementById(id); t.select(); document.execCommand('copy'); alert("Copiado!"); }

    // REGISTRO PWA - CAMINHO ABSOLUTO PARA EVITAR 404
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Calculadora-JBLAR-beta/sw.js', { scope: '/Calculadora-JBLAR-beta/' });
      });
    }
</script>
</body>
</html>
